<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Collection Management</title>
    <link rel="stylesheet" href="../admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<header class="top-nav">
    <div class="nav-top-row">
        <div class="logo-area">
            <div class="logo-icon"><img src="/PMACS/images/pmacs_logo_bw.png" alt="PMACS Logo"></div>
            <h2>PMACS Admin</h2>
        </div>
        <div class="top-links">
            <a href="#">SETTINGS</a>
            <a href="#" onclick="window.handleLogout()">LOGOUT</a>
        </div>
    </div>

    <nav class="main-menu">
        <a href="../vendor_list/vendor.html" class="menu-item">VENDOR <i class="fa-solid fa-address-card"></i></a>
        <a href="../admin.html" class="menu-item" data-no-transition>DASHBOARD <i
                class="fa-solid fa-chalkboard"></i></a>
        <a href="../notification/notification.html" class="menu-item">NOTIFICATIONS <i
                class="fa-solid fa-bell"></i></a>
        <a href="tax_list.html" class="menu-item active">TAX LIST <i class="fa-solid fa-receipt"></i></a>
    </nav>
</header>

<main class="main-content">
    <div class="page-header">
        <div class="header-left">
            <div class="title-area">
                <h1>TAX MANAGEMENT</h1>
                <p>MANAGE OFFICIAL COLLECTION FEES</p>
                <h2 class="date-display" id="currentDate">LOADING DATE...</h2>
            </div>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" id="btnRefresh" style="margin-right: 10px;">
                <i class="fa-solid fa-arrows-rotate"></i> REFRESH
            </button>
            <button class="btn btn-primary" onclick="openAddTaxModal()">
                <i class="fa-solid fa-plus"></i> ADD NEW TAX
            </button>
        </div>
    </div>

    <div id="taxListContainer" class="tax-list-container">
        <!-- Tax content will be loaded here by tax_list.js -->
    </div>
</main>

<!-- Add/Edit Tax Modal -->
<div id="addTaxModal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 550px;">
        <div class="modal-header">
            <h2 id="modalTitle">Add New Tax</h2>
            <button class="close-btn" onclick="closeAddTaxModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="taxForm" class="tax-form">
                <div class="form-group">
                    <label for="area">Area/Building</label>
                    <input type="text" id="area" name="area" required placeholder="e.g., Building A, Zone 1">
                </div>
                <div class="form-group">
                    <label for="productServices">Service/Product</label>
                    <input type="text" id="productServices" name="productServices" required
                           placeholder="e.g., Water Supply, Electricity">
                </div>
                <div class="form-group">
                    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                        <label style="font-size:12px;font-weight:700;color:#224263;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;margin:0;">Range Type</label>
                        <div style="display:flex;gap:16px;align-items:center;">
                            <label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#224263;cursor:pointer;margin:0;">
                                <input type="radio" name="rangeType" value="fixed" checked onchange="updateRangeFields()" style="width:16px;height:16px;accent-color:#2971b9;"> Fixed Amount
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#224263;cursor:pointer;margin:0;">
                                <input type="radio" name="rangeType" value="range" onchange="updateRangeFields()" style="width:16px;height:16px;accent-color:#2971b9;"> Range Based
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-group" id="amount-group">
                    <label for="amount">Amount (₱)</label>
                    <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">
                </div>
                <div id="rangeFields" class="hidden"
                     style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label for="rangeMin">Minimum (₱)</label>
                        <input type="number" id="rangeMin" name="rangeMin" step="0.01" placeholder="Min value">
                    </div>
                    <div class="form-group">
                        <label for="rangeMax">Maximum (₱)</label>
                        <input type="number" id="rangeMax" name="rangeMax" step="0.01" placeholder="Max value">
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="quantified" name="quantified">
                        Quantified (Computable by product/weight)
                    </label>
                </div>
                <div class="form-actions" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button type="submit" class="btn btn-success">Save Tax Configuration</button>
                    <button type="button" class="btn btn-secondary" onclick="closeAddTaxModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteConfirmModal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 450px;">
        <div class="modal-header">
            <h2>Delete Tax Entry</h2>
            <button class="close-btn" onclick="closeDeleteConfirm()">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center; padding: 20px 0;">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: var(--accent-color); margin-bottom: 15px;"></i>
            <p>Are you sure you want to delete this tax?</p>
            <div id="deleted-tax-details" style="margin: 15px 0; padding: 15px; background: #fff5f5; border-radius: 8px; border: 1px solid #fed7d7; font-weight: 600; color: #c53030;"></div>
            <p style="color: #7f8c8d; font-size: 13px; margin-top: 10px;">This action cannot be undone and may affect existing vendor calculations.</p>
        </div>
        <div class="form-actions" style="justify-content: center;">
            <button class="btn btn-danger" onclick="confirmDelete()">Delete Entry</button>
            <button class="btn btn-secondary" onclick="closeDeleteConfirm()">Cancel</button>
        </div>
    </div>
</div>

<!-- Update Notification Modal -->
<div id="updateNotificationModal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 450px; text-align: center;">
        <div class="modal-body" style="padding: 30px;">
            <div id="tax-trend-indicator" style="font-size: 3rem; margin-bottom: 15px;"></div>
            <h2 id="tax-trend-text" style="margin-bottom: 10px;"></h2>
            <p id="tax-trend-details" style="color: #555;"></p>
            <div class="form-actions" style="justify-content: center; border-top: none; padding-top: 30px;">
                <button class="btn btn-primary" onclick="closeUpdateNotification()">Got It</button>
            </div>
        </div>
    </div>
</div>

<!-- Notifications Container -->
<div id="notificationsContainer" class="notifications-container"></div>

<script src="tax_list.js" type="module"></script>
</body>

</html>
